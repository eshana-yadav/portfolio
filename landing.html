<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
    background: black;
    color: white;
}

nav ul {
    display: flex;
    list-style: none;
    gap: 20px;
}

/* HERO */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px;
    background: #f5f5f5;
}

.hero-text {
    max-width: 500px;
}

.hero button {
    padding: 10px 20px;
    background: blue;
    color: white;
    border: none;
}

/* FEATURES */
.features {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px;
}

.box {
    width: 250px;
    padding: 20px;
    background: #eee;
    text-align: center;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: black;
    color: white;
}
</style>

</head>

<body>

<nav>
    <h2>MyProduct</h2>
    <ul>
        <li>Home</li>
        <li>Features</li>
        <li>Contact</li>
    </ul>
</nav>

<div class="hero">
    <div class="hero-text">
        <h1>Build Your Future Website</h1>
        <p>Create modern and responsive websites easily.</p>
        <button>Get Started</button>
    </div>

    <img src="https://via.placeholder.com/300">
</div>

<section class="features">
    <div class="box">
        <h3>Fast</h3>
        <p>Optimized performance</p>
    </div>

    <div class="box">
        <h3>Responsive</h3>
        <p>Works on all devices</p>
    </div>

    <div class="box">
        <h3>Easy</h3>
        <p>Simple and clean design</p>
    </div>
</section>

<footer>
    <p>© 2026 MyProduct</p>
</footer>

</body>
</html>
